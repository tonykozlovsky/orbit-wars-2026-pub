# Dict→dict→tensor IO contracts for Orbit (batched player axis = ``flags.agents_max_cnt``).
# Shapes use ``flags.agents_max_cnt`` for the leading dimension (4 in default training config).
#
# Contracts: ``orbit_wars_env_unpadded_output`` (``OrbitWarsEnv``), ``orbit_wars_env_output`` (after
# ``OrbitPaddingWrapper``), ``reward_wrapper_output`` (after ``RewardWrapper``), ``obs_wrapper_output``
# (after ``ObsWrapper``; includes the same tensor leaves as ``reward_wrapper_output`` plus policy ``obs``),
# ``logging_wrapper_output`` (after ``LoggingWrapper``; same leaves as ``obs_wrapper_output`` plus ``info`` cumsums).
# ``remap_and_filter_wrapper_output`` (after ``RemapAndFilterWrapper``; only remapped top-level keys:
# ``obs_LEARN_INFER``, ``metrics_STAT``, ``reward_LEARN_STAT``, ``done_LEARN_STAT``, ``desync_done``, ``info_STAT``).
# ``env_batch_wrapper_output`` (after ``EnvBatchWrapper``: same paths as remap, shapes prefixed with
# ``flags.n_actor_envs`` from stacking inner envs on dim 0; per-env ``done`` scalar becomes ``[E]``).
#
# Torchbeast buffers (see ``create_buffers.compute_buffer_spec``): ``infer_request_buffer_template`` matches
# one CPU infer-request slot (same ``obs_LEARN_INFER`` as env batch). ``infer_result_buffer_template``: one
# infer-result slot (same ``(E, P, …)`` layout as ``obs_LEARN_INFER`` policy tensors). ``actor_learn_buffer_template``:
# per-actor LEARN CPU rollout tree (leading time ``flags.rollout_time_steps``). ``learner_gpu_buffer_template``:
# merged LEARN GPU batch (time × ``flags.batch_size`` × 1 player lane per tensor).
#
# Env tensors use ``flags.agents_max_cnt`` (four policy slots); 2p active seats occupy slots 0 and 3.
#
# Runtime validation is off unless ``IMPALA_DICT_IO_VALIDATE=1`` (see ``dict_io_contract.py``).
