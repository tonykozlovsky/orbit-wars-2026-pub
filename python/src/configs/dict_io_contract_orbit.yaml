      - obs_LEARN_INFER.available_action_mask
      - obs_LEARN_INFER.action_taken_index
      - obs_LEARN_INFER.player_mask
    tensors:
      obs_LEARN_INFER.orbit_planet_features:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 44, 48]
        dtype: float32
      obs_LEARN_INFER.orbit_planet_arrival_features:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 44, 100, 4, 13]
        dtype: float32
      obs_LEARN_INFER.orbit_enemy_mask:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 3]
        dtype: float32
      obs_LEARN_INFER.orbit_planet_mask:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 44]
        dtype: float32
      obs_LEARN_INFER.orbit_planet_pairwise_mask:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 1936]
        dtype: float32
      obs_LEARN_INFER.orbit_planet_pairwise_features:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 1936, 38]
        dtype: float32
      obs_LEARN_INFER.available_action_mask:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 44, 88]
        dtype: int8
      obs_LEARN_INFER.action_taken_index:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 44, 1]
        dtype: int32
      obs_LEARN_INFER.player_mask:
        shape: [flags.rollout_time_steps, flags.batch_size, 1]
        dtype: float32

  learner_gpu_policy_masks:
    paths:
      - action_taken_index_LEARN_STAT
    tensors:
      action_taken_index_LEARN_STAT:
        shape: [flags.rollout_time_steps, flags.batch_size, 1, 44, 1]
        dtype: int32

contracts:
  orbit_wars_env_unpadded_output:
    leaves:
      plus:
        - obs_raw_episode_step_and_orbit_episode_done
        - metrics_orbit_fleet_delta_and_env_step
        - orbit_cpp_policy_obs_padded

  orbit_wars_env_output:
    leaves:
      plus:
        - obs_raw_episode_step_and_orbit_episode_done
        - metrics_orbit_fleet_delta_and_env_step
        - orbit_cpp_policy_obs_padded

  reward_wrapper_output:
    leaves:
      plus:
        - obs_raw_episode_step_and_orbit_episode_done
        - reward_wrapper_metrics_reward_done

  obs_wrapper_output:
    leaves:
      plus:
        - obs_raw_episode_step_and_orbit_episode_done
        - reward_wrapper_metrics_reward_done
        - obs_wrapper_policy_obs

  logging_wrapper_output:
    leaves:
      plus:
        - obs_raw_episode_step_and_orbit_episode_done
        - reward_wrapper_metrics_reward_done
        - obs_wrapper_policy_obs
        - logging_wrapper_info_cumsums

  remap_and_filter_wrapper_output:
    leaves:
      plus:
        - remap_wrapper_metrics_reward_done
        - remap_wrapper_original_player_mask_stat
        - remap_wrapper_obs_policy
        - remap_wrapper_obs_masks_stat
        - remap_wrapper_info_cumsums

  env_batch_wrapper_output:
    leaves:
      plus:
        - env_batch_remap_wrapper_metrics_reward_done
        - env_batch_original_player_mask_stat
        - env_batch_remap_wrapper_obs_policy
        - env_batch_remap_wrapper_obs_masks_stat
        - env_batch_remap_wrapper_info_cumsums

  infer_request_buffer_template:
    leaves:
      plus:
        - env_batch_remap_wrapper_obs_policy
        - benchmark_infer_request_seat_mapping

  infer_result_buffer_template:
    leaves:
      plus:
        - infer_result_policy_slots

  actor_learn_buffer_template:
    leaves:
      plus:
        - actor_learn_reward_done
        - actor_learn_policy_heads
        - actor_learn_obs_policy
        - actor_learn_policy_masks

  learner_gpu_buffer_template:
    leaves:
      plus:
        - learner_gpu_reward_done
        - learner_gpu_policy_heads
        - learner_gpu_obs_policy
        - learner_gpu_policy_masks

# ``env.step(actions)`` for inner Orbit stack: required list of per-seat CPU tensors; optional tape extras.
contracts_step_inputs:
  orbit_wars_env_step_actions:
    dict_key: orbit_pairwise_classes
    list_length_from_flags: orbit_num_agents
    item:
      shape: [44]
      dtype: int64
      cpu_only: true
    optional_tensor_leaves:
      tape_baseline_LEARN:
        shape: [flags.orbit_num_agents]
        dtype: float32
        cpu_only: true
    optional_any_leaves:
      - tape_supervised_pred
    optional_dict_tensor_leaves:
      tape_supervised_target:
        value:
          shape: [flags.orbit_num_agents, 44]
          dtype: float32
          cpu_only: true
      tape_supervised_valid:
        value:
          shape: [flags.orbit_num_agents, 44]
          dtype: bool
          cpu_only: true
